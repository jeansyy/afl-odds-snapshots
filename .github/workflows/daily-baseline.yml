name: AFL daily baseline snapshot

on:
  schedule:
    - cron: "0 22 * * *"  # 9am AEDT (UTC+11) = 10pm UTC previous day
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Daily baseline snapshot
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scripts/snapshot_afl_odds.py --out outputs/afl_snapshots --label daily

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add outputs/afl_snapshots
          if git diff --staged --quiet; then
            echo "No new snapshots to commit"
          else
            git commit -m "afl daily baseline snapshot"
            git push
          fi
